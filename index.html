<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wealth Calculator</title>
<style>
:root{--bg:#0f1117;--panel:#151923;--btn:#1f2430;--btn-hover:#2b3242;--accent:#00d4ff;--text:#e6edf3;--muted:#8b949e}
*{box-sizing:border-box;font-family:Segoe UI,Arial,Helvetica,sans-serif}
body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#141a25,#090b10);display:flex;align-items:center;justify-content:center;color:var(--text)}
.card{width:360px;max-width:92vw;background:var(--panel);border-radius:18px;box-shadow:0 20px 50px rgba(0,0,0,.6);padding:18px}
.title{text-align:center;font-size:16px;letter-spacing:1px;margin-bottom:8px}
.subtitle{text-align:center;color:var(--muted);font-size:12px;margin-bottom:14px}
.field{margin-bottom:10px}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
input,select{width:100%;height:44px;border-radius:10px;border:none;background:#0b0e14;color:var(--text);padding:0 12px;font-size:15px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{width:100%;height:48px;border:none;border-radius:12px;background:var(--btn);color:var(--text);font-size:16px;cursor:pointer;transition:.15s ease}
button:hover{background:var(--btn-hover);transform:scale(.98)}
.primary{background:var(--accent);color:#000;font-weight:700}
.result{margin-top:14px;background:#0b0e14;border-radius:12px;padding:14px}
.big{font-size:24px;font-weight:700;text-align:center}
.small{text-align:center;color:var(--muted);font-size:12px}
.cta{margin-top:12px;text-align:center}
.cta a{display:inline-block;text-decoration:none;background:#25D366;color:#001b0f;padding:10px 14px;border-radius:12px;font-weight:700}
.footer{text-align:center;margin-top:10px;color:var(--muted);font-size:11px}
</style>
</head>
<body>
<div class="card">
  <div class="title">💰 Lily Wealth Calculator</div>
  <div class="subtitle">भविष्य की राशि जानें • समझदारी से निवेश करें</div>

  <div class="field">
    <label>प्रकार चुनें</label>
    <select id="mode">
      <option value="lumpsum">एकमुश्त (Lumpsum)</option>
      <option value="sip">मासिक निवेश (SIP)</option>
    </select>
  </div>

  <div class="field" id="pWrap">
    <label id="pLabel">प्रारम्भिक राशि (₹)</label>
    <input id="principal" type="number" placeholder="जैसे 10000" />
  </div>

  <div class="field">
    <label>ब्याज दर (% प्रति वर्ष)</label>
    <input id="rate" type="number" placeholder="जैसे 12" />
  </div>

  <div class="field">
    <label>अवधि (वर्ष)</label>
    <input id="years" type="number" placeholder="जैसे 10" />
  </div>

  <div class="row">
    <button onclick="clearAll()">साफ़ करें</button>
    <button class="primary" onclick="calculate()">गणना करें</button>
  </div>

  <div class="result">
    <div class="small">भविष्य की अनुमानित राशि</div>
    <div id="future" class="big">₹ 0</div>
    <div id="invested" class="small">कुल निवेश: ₹ 0</div>
  </div>

  <div class="cta">
    <!-- नीचे YOUR_WHATSAPP_NUMBER में अपना नंबर लिखें, जैसे 919876543210 -->
    <a id="wa" href="https://wa.me/YOUR_WHATSAPP_NUMBER?text=Namaste%2C%20mujhe%20wealth%20guidance%20chahiye">मार्गदर्शन के लिए WhatsApp करें</a>
  </div>

  <div class="footer">Powered by Gandharwa Anand</div>
</div>

<script>
const mode=document.getElementById('mode');
const pLabel=document.getElementById('pLabel');
const principal=document.getElementById('principal');
const rate=document.getElementById('rate');
const years=document.getElementById('years');
const future=document.getElementById('future');
const invested=document.getElementById('invested');

mode.addEventListener('change',()=>{
  if(mode.value==='sip'){
    pLabel.innerText='मासिक निवेश राशि (₹)';
    principal.placeholder='जैसे 2000';
  }else{
    pLabel.innerText='प्रारम्भिक राशि (₹)';
    principal.placeholder='जैसे 10000';
  }
});

function formatINR(x){
  return new Intl.NumberFormat('en-IN',{maximumFractionDigits:0}).format(x);
}

function calculate(){
  const P=parseFloat(principal.value)||0;
  const r=(parseFloat(rate.value)||0)/100;
  const t=parseFloat(years.value)||0;
  if(P<=0||r<=0||t<=0){alert('कृपया सभी मान सही भरें');return}

  let FV=0, investedAmt=0;
  if(mode.value==='lumpsum'){
    const n=1; // annual compounding
    FV=P*Math.pow(1+r/n,n*t);
    investedAmt=P;
  }else{ // SIP monthly
    const i=r/12; const m=12*t;
    FV=P*((Math.pow(1+i,m)-1)/i)*(1+i);
    investedAmt=P*m;
  }

  future.innerText='₹ '+formatINR(FV);
  invested.innerText='कुल निवेश: ₹ '+formatINR(investedAmt);
}

function clearAll(){
  principal.value='';rate.value='';years.value='';
  future.innerText='₹ 0';invested.innerText='कुल निवेश: ₹ 0';
}
</script>
</body>
</html>
