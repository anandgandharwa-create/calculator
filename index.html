<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dark Theme Calculator</title>
<style>
  :root{
    --bg:#0f1117;
    --panel:#151923;
    --btn:#1f2430;
    --btn-hover:#2b3242;
    --accent:#00d4ff;
    --text:#e6edf3;
    --danger:#ff4d4d;
  }

  *{box-sizing:border-box;font-family:Segoe UI,Arial,Helvetica,sans-serif}

  body{
    margin:0;
    height:100vh;
    background:radial-gradient(circle at top,#141a25,#090b10);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text);
  }

  .calculator{
    width:320px;
    background:var(--panel);
    border-radius:18px;
    box-shadow:0 20px 50px rgba(0,0,0,.6);
    padding:18px;
  }

  .title{
    text-align:center;
    font-size:14px;
    letter-spacing:2px;
    margin-bottom:10px;
    color:#8b949e;
  }

  .display{
    width:100%;
    height:70px;
    background:#0b0e14;
    border-radius:12px;
    margin-bottom:15px;
    padding:10px 14px;
    text-align:right;
    font-size:28px;
    overflow-x:auto;
    white-space:nowrap;
  }

  .buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
  }

  button{
    height:55px;
    border:none;
    border-radius:12px;
    background:var(--btn);
    color:var(--text);
    font-size:18px;
    cursor:pointer;
    transition:.15s ease;
  }

  button:hover{background:var(--btn-hover);transform:scale(.97)}
  button:active{transform:scale(.92)}

  .operator{color:var(--accent);font-weight:600}
  .equal{background:var(--accent);color:#000;font-weight:bold}
  .equal:hover{background:#00b8db}
  .clear{color:var(--danger);font-weight:bold}
  .zero{grid-column:span 2}

  .footer{
    text-align:center;
    margin-top:12px;
    font-size:12px;
    color:#6e7681;
  }
</style>
</head>
<body>

<div class="calculator">
  <div class="title">DARK CALCULATOR</div>
  <div id="display" class="display">0</div>

  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button onclick="deleteLast()">⌫</button>
    <button class="operator" onclick="append('%')">%</button>
    <button class="operator" onclick="append('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="operator" onclick="append('*')">×</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="operator" onclick="append('-')">−</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="operator" onclick="append('+')">+</button>

    <button class="zero" onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button class="equal" onclick="calculate()">=</button>
  </div>

  <div class="footer">Keyboard Supported • GitHub Ready</div>
</div>

<script>
let display=document.getElementById('display');

function append(value){
  if(display.innerText==='0') display.innerText=value;
  else display.innerText+=value;
}

function clearDisplay(){
  display.innerText='0';
}

function deleteLast(){
  let text=display.innerText;
  if(text.length<=1) display.innerText='0';
  else display.innerText=text.slice(0,-1);
}

function calculate(){
  try{
    let result=eval(display.innerText.replace('%','/100'));
    display.innerText=result;
  }catch{
    display.innerText='Error';
  }
}

// Keyboard Support

document.addEventListener('keydown',function(e){
  const key=e.key;

  if(!isNaN(key)||['+','-','*','/','.','%'].includes(key)) append(key);
  if(key==='Enter') calculate();
  if(key==='Backspace') deleteLast();
  if(key==='Escape') clearDisplay();
});
</script>

</body>
</html>
